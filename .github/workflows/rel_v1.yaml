---
name: release-branch

on:
    push:
        branches:
          - rel_v1

jobs:
    maven-build-job:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            security-events: write
        steps:
          - name: get the code
            uses: actions/checkout@v4        # v6 does not exist; latest stable is v4
          - name: setup java
            uses: actions/setup-java@v4
            with:
                java-version: '21'
                distribution: 'temurin'
                server-id: github
                settings-path: ${{ github.workspace }}
          - name: cache maven dependencies
            uses: actions/cache@v4
            with:
                path: ~/.m2/repository
                key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
                restore-keys: ${{ runner.os }}-maven-
          - name: publish package
            run: |
              mvn deploy \
                -Dcheckstyle.skip=true \
                -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


    docker-build-job:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            security-events: write
        steps:
            - name: get the code
              uses: actions/checkout@v4      # v6 does not exist; latest stable is v4
            
            # ✅ Fix: Convert owner name to lowercase for GHCR compatibility
            - name: Set lowercase owner name
              run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Login into Github Container Registry
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ghcr.io/${{ env.OWNER }}/spring-petclinic-packages-apr-26
            - name: build docker image
              uses: docker/build-push-action@v6
              with:
                push: true
                context: .
                tags: |
                    ghcr.io/${{ env.OWNER }}/spring-petclinic-packages-apr-26:latest
                    ghcr.io/${{ env.OWNER }}/spring-petclinic-packages-apr-26:${{ github.sha }}